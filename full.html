<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Tableau Mobile · modular full-featured</title>
    <!-- Chart.js -->
    <script src="/assets/chart.umd.min.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="/assets/beta3/all.min.css">
    <style>
        /* === CSS (unchanged, same as previous working version) === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        html {
            background-color: #1e1e1e;
        }
        body {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            min-height: 100vh;
            margin: 0 auto;
            background-color: #2c2c2c;
            border-radius: 20px 20px 16px 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #3d3d3d;
            display: flex;
            flex-direction: column;
        }
        .toolbar {
            background-color: #0f2b3d;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            border-bottom: 1px solid #1e4b62;
            flex-shrink: 0;
            position: relative;
            z-index: 20;
            flex-wrap: wrap;
            gap: 4px;
        }
        .toolbar-left, .toolbar-right {
            display: flex;
            gap: 14px;
            align-items: center;
        }
        .toolbar i {
            font-size: 1.1rem;
            color: #c1e4ff;
            cursor: pointer;
        }
        .toolbar .fa-tableau {
            font-weight: bold;
            font-style: normal;
            background: white;
            color: #0f2b3d;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            cursor: default;
        }
        .dataset-select {
            background: #1f4b62;
            border: 1px solid #3d8bb8;
            color: white;
            padding: 4px 20px 4px 8px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="%23ffffff" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 8px center;
            cursor: pointer;
            max-width: 120px;
        }
        .dataset-select option {
            background: #0f2b3d;
            color: white;
        }
        .menu-dropdown {
            position: absolute;
            top: 45px;
            left: 12px;
            background: #1c3343;
            border: 1px solid #3b6980;
            border-radius: 16px;
            padding: 8px 0;
            width: 180px;
            box-shadow: 0 8px 16px black;
            display: none;
            z-index: 30;
        }
        .menu-dropdown.show {
            display: block;
        }
        .menu-item {
            padding: 12px 18px;
            color: #e1f0fa;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2b5064;
            cursor: pointer;
        }
        .menu-item:last-child {
            border-bottom: none;
        }
        .menu-item i {
            color: #f5c542;
        }
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            background-color: #1e1e1e;
        }
        .data-panel {
            width: 100px;
            flex-shrink: 0;
            background-color: #252525;
            padding: 8px 6px;
            overflow-y: auto;
            border-right: 1px solid #3e3e3e;
            color: #eee;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .field-group {
            margin-bottom: 6px;
        }
        .field-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 4px;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .field-pills {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .pill {
            background-color: #3a3f44;
            border: 1px solid #555;
            color: #f0f0f0;
            padding: 4px 6px;
            border-radius: 30px;
            font-size: 0.6rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: background 0.1s;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .pill i {
            color: #6bb7e4;
            font-size: 0.55rem;
            flex-shrink: 0;
        }
        .pill.measure i {
            color: #b5e06b;
        }
        .pill.selected {
            background-color: #1f5c7a;
            border-color: #6bbaf0;
        }
        .shelf-row {
            display: flex;
            align-items: center;
            gap: 4px;
            background-color: #1f2a32;
            padding: 4px 6px;
            border-radius: 12px;
            border-left: 3px solid #2b7eb0;
            margin-bottom: 6px;
            cursor: pointer;
            width: 100%;
            overflow: hidden;
        }
        .shelf-icon {
            color: #6fb4e0;
            font-size: 0.7rem;
            width: 16px;
            text-align: center;
            flex-shrink: 0;
        }
        .shelf-placeholder {
            background-color: #2d3b45;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
            color: #b0c7d9;
            border: 1px dashed #4f6f86;
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .marks-card {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: #202b33;
            margin-top: 8px;
            padding: 8px 6px;
            border-radius: 18px;
            border: 1px solid #3c5768;
        }
        .mark-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #2f404d;
            padding: 4px 8px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.6rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .mark-item i {
            color: #f5c542;
            font-size: 0.65rem;
            flex-shrink: 0;
        }
        .canvas-area {
            flex: 1;
            background-color: #1e1e1e;
            padding: 8px 8px 0 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .dataset-header {
            background-color: #1f3a48;
            border-radius: 30px;
            padding: 6px 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #c1e4ff;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid #2b5c7a;
            flex-shrink: 0;
        }
        .dataset-header i {
            color: #f5c542;
            font-size: 0.8rem;
        }
        .chart-card {
            background-color: #2a2a2a;
            border-radius: 20px;
            padding: 10px 6px 6px 6px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6);
            width: 100%;
            flex-shrink: 0;
            margin-bottom: 8px;
        }
        .viz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 6px 8px 6px;
            color: #b6d6f0;
            font-size: 0.7rem;
            border-bottom: 1px solid #3a4b56;
        }
        .chart-container {
            position: relative;
            width: 100%;
            height: 170px;
            margin-top: 6px;
        }
        .control-row {
            display: flex;
            gap: 6px;
            margin: 10px 0 6px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .ctrl-btn {
            background: #324a5a;
            border: none;
            color: white;
            padding: 4px 5px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            border: 1px solid #4e6d82;
            flex: 1 0 auto;
            justify-content: center;
            cursor: pointer;
        }
        .field-selector {
            display: flex;
            gap: 4px;
            background: #1a2933;
            padding: 6px 4px;
            border-radius: 30px;
            margin: 6px 0 0;
            flex-wrap: wrap;
            justify-content: space-around;
        }
        .selector {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 50px;
        }
        .selector label {
            color: #9cc4e4;
            font-size: 0.5rem;
            text-transform: uppercase;
        }
        .field-selector select {
            background: #2a404e;
            border: 1px solid #3d6b82;
            color: white;
            padding: 4px 16px 4px 6px;
            border-radius: 30px;
            font-size: 0.6rem;
            font-weight: 500;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="%23aaccff" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 5px center;
            width: 100%;
        }
        .sheet-bar {
            display: flex;
            align-items: center;
            background-color: #1a2a34;
            border-top: 1px solid #2d4c60;
            border-bottom: 1px solid #0f1e28;
            padding: 4px 8px;
            gap: 6px;
            overflow-x: auto;
            overflow-y: hidden;
            flex-shrink: 0;
            scrollbar-width: thin;
            scrollbar-color: #3d6377 #1a2a34;
            margin-top: auto;
        }
        .sheet-bar::-webkit-scrollbar {
            height: 4px;
        }
        .sheet-bar::-webkit-scrollbar-thumb {
            background: #3d6377;
            border-radius: 10px;
        }
        .sheet-tab {
            background-color: #253b48;
            border: 1px solid #2b5064;
            color: #cde1f0;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: background 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .sheet-tab.active {
            background-color: #1f5c7a;
            border-color: #6bbaf0;
            color: white;
        }
        .sheet-tab i {
            font-size: 0.6rem;
            color: #f5c542;
        }
        .sheet-add {
            background-color: #1f3a48;
            border: 1px dashed #4f7e9c;
            color: #b3defa;
            padding: 6px 10px;
            border-radius: 30px;
            font-size: 0.65rem;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .status-bar {
            background: #14212b;
            padding: 6px 14px;
            color: #8ba0b2;
            font-size: 0.6rem;
            display: flex;
            gap: 12px;
            border-top: 1px solid #2d4a5a;
            flex-shrink: 0;
        }
        body {
            padding-top: env(safe-area-inset-top);
            padding-bottom: calc(env(safe-area-inset-bottom) - 40px);
            overflow: hidden;
        }
        .status-bar {
            padding-bottom: 15px;
        }
    </style>
</head>
<body>
    <!-- toolbar -->
    <div class="toolbar">
        <div class="toolbar-left">
            <i class="fas fa-bars" id="menuIcon"></i>
            <span class="fa-tableau">TABLEAU</span>
            <select id="datasetSelector" class="dataset-select">
                <option value="superstore">📊 Superstore</option>
                <option value="tiktok">📱 TikTok</option>
            </select>
        </div>
        <div class="toolbar-right">
            <i class="fas fa-search" id="searchIcon"></i>
            <i class="fas fa-undo-alt" id="undoIcon"></i>
            <i class="fas fa-share-alt" id="shareIcon"></i>
        </div>
        <div class="menu-dropdown" id="menuDropdown">
            <div class="menu-item" data-sheet="0"><i class="fas fa-chart-pie"></i> Sheet 1</div>
            <div class="menu-item" data-sheet="1"><i class="fas fa-chart-bar"></i> Sheet 2</div>
            <div class="menu-item" id="newSheetBtn"><i class="fas fa-plus-circle"></i> New Sheet</div>
        </div>
    </div>

    <!-- workspace -->
    <div class="workspace">
        <!-- LEFT PANEL (100px) -->
        <div class="data-panel" id="dataPanel">
            <div class="field-group">
                <div class="field-label"><i class="fas fa-cube"></i> Dimensions</div>
                <div class="field-pills" id="dimensionPills"></div>
            </div>
            <div class="field-group">
                <div class="field-label"><i class="fas fa-chart-bar"></i> Measures</div>
                <div class="field-pills" id="measurePills"></div>
            </div>
            <div class="shelf-row" id="columnShelf">
                <i class="fas fa-columns shelf-icon"></i>
                <div class="shelf-placeholder" id="column-shelf"><i class="fas fa-plus-circle"></i> Category</div>
            </div>
            <div class="shelf-row" id="rowShelf">
                <i class="fas fa-chart-bar shelf-icon"></i>
                <div class="shelf-placeholder" id="row-shelf"><i class="fas fa-chart-line"></i> Sales</div>
            </div>
            <div class="marks-card" id="marksCard">
                <div class="mark-item" id="colorMark"><i class="fas fa-palette"></i> Color: <span id="colorValue">none</span></div>
                <div class="mark-item" id="sizeMark"><i class="fas fa-circle"></i> Size: <span id="sizeValue">–</span></div>
                <div class="mark-item" id="labelMark"><i class="fas fa-tag"></i> Label: <span id="labelValue">–</span></div>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="canvas-area">
            <div class="dataset-header" id="datasetHeader">
                <i class="fas fa-database"></i> <span id="datasetName">Superstore</span>
            </div>
            <div class="chart-card">
                <div class="viz-header">
                    <span><i class="fas fa-chart-pie"></i> <span id="sheetName">Sheet 1</span></span>
                    <span><i class="fas fa-expand-alt"></i></span>
                </div>
                <div class="chart-container">
                    <canvas id="tableauChart" width="300" height="150"></canvas>
                </div>
                <div class="control-row">
                    <button class="ctrl-btn" id="barBtn"><i class="fas fa-chart-bar"></i> Bar</button>
                    <button class="ctrl-btn" id="lineBtn"><i class="fas fa-chart-line"></i> Line</button>
                    <button class="ctrl-btn" id="pieBtn"><i class="fas fa-chart-pie"></i> Pie</button>
                </div>
                <div class="field-selector">
                    <div class="selector"><label>X</label><select id="xAxisSelect"></select></div>
                    <div class="selector"><label>Y</label><select id="yAxisSelect"></select></div>
                    <div class="selector"><label>Color</label><select id="colorSelect"><option value="none">None</option></select></div>
                </div>
            </div>
            <div class="sheet-bar" id="sheetBar">
                <div class="sheet-add" id="addSheetTab"><i class="fas fa-plus"></i> New</div>
            </div>
        </div>
    </div>

    <!-- status bar -->
    <div class="status-bar">
        <span>🔹 4 marks · 3 dims</span>
        <span>📍 Sum varies</span>
    </div>

    <!-- ========== MODULAR SCRIPTS (IIFE) ========== -->
    <!-- 1. Data Module -->
    <script>
        var DataModule = (function() {
            // Private datasets
            const datasets = {
                superstore: {
                    name: 'Superstore',
                    dimensions: ['Category', 'Region', 'Segment'],
                    measures: ['Sales', 'Profit', 'Quantity'],
                    dimensionValues: {
                        Category: ['Furniture', 'Office Supplies', 'Technology'],
                        Region: ['East', 'Central', 'West', 'South'],
                        Segment: ['Consumer', 'Corporate', 'Home Office']
                    },
                    measureData: {
                        Sales: {
                            'Furniture': [4200, 3100, 5100, 2800],
                            'Office Supplies': [3800, 4200, 4700, 3300],
                            'Technology': [6900, 5400, 8100, 4900]
                        },
                        Profit: {
                            'Furniture': [520, 410, 680, 320],
                            'Office Supplies': [720, 840, 930, 610],
                            'Technology': [1220, 980, 1510, 870]
                        },
                        Quantity: {
                            'Furniture': [18, 12, 24, 10],
                            'Office Supplies': [32, 28, 36, 22],
                            'Technology': [15, 12, 21, 11]
                        }
                    },
                    colorDimensions: ['Region', 'Segment']
                },
                tiktok: {
                    name: 'TikTok Analytics',
                    dimensions: ['User', 'PostType', 'Day'],
                    measures: ['Likes', 'Shares', 'Comments'],
                    dimensionValues: {
                        User: ['User1','User2','User3','User4','User5','User6','User7','User8','User9','User10'],
                        PostType: ['Video','Image','Carousel'],
                        Day: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun']
                    },
                    measureData: {
                        Likes: {
                            'User1': [320, 150, 80],
                            'User2': [450, 220, 130],
                            'User3': [210, 340, 95],
                            'User4': [560, 280, 170],
                            'User5': [390, 410, 200],
                            'User6': [610, 330, 140],
                            'User7': [275, 190, 210],
                            'User8': [480, 260, 115],
                            'User9': [525, 305, 185],
                            'User10': [440, 370, 155]
                        },
                        Shares: {
                            'User1': [45, 22, 13],
                            'User2': [67, 35, 21],
                            'User3': [31, 51, 14],
                            'User4': [84, 42, 26],
                            'User5': [58, 62, 30],
                            'User6': [92, 50, 21],
                            'User7': [41, 28, 32],
                            'User8': [72, 39, 17],
                            'User9': [79, 46, 28],
                            'User10': [66, 56, 23]
                        },
                        Comments: {
                            'User1': [12, 8, 4],
                            'User2': [19, 11, 7],
                            'User3': [8, 15, 5],
                            'User4': [23, 13, 9],
                            'User5': [16, 18, 10],
                            'User6': [27, 14, 6],
                            'User7': [11, 9, 12],
                            'User8': [20, 12, 5],
                            'User9': [22, 14, 10],
                            'User10': [18, 16, 8]
                        }
                    },
                    colorDimensions: ['PostType', 'Day']
                }
            };

            let currentDatasetKey = 'superstore';
            let currentDataset = datasets.superstore;

            // Public API
            return {
                getCurrentDataset: function() { return currentDataset; },
                getDatasetKeys: function() { return Object.keys(datasets); },
                switchDataset: function(key) {
                    if (datasets[key] && key !== currentDatasetKey) {
                        currentDatasetKey = key;
                        currentDataset = datasets[key];
                        return true;
                    }
                    return false;
                },
                getChartData: function(dimName, measureName, colorBy) {
                    const ds = currentDataset;
                    const labels = ds.dimensionValues[dimName] || [];
                    let datasetsArr = [];

                    if (colorBy === 'none' || (ds.colorDimensions.includes(colorBy) && dimName === colorBy)) {
                        const dataPoints = labels.map(label => {
                            if (ds.measureData[measureName] && ds.measureData[measureName][label]) {
                                return ds.measureData[measureName][label].reduce((a,b) => a + b, 0);
                            }
                            return 0;
                        });
                        datasetsArr = [{
                            label: measureName,
                            data: dataPoints,
                            backgroundColor: '#4f9fd4',
                            borderRadius: 6
                        }];
                    } else if (ds.colorDimensions.includes(colorBy)) {
                        const colorCategories = ds.dimensionValues[colorBy] || [];
                        datasetsArr = colorCategories.map((cat, idx) => {
                            const hue = (idx * 60) % 360;
                            const color = `hsla(${hue}, 70%, 60%, 0.8)`;
                            const dataPoints = labels.map(label => {
                                if (ds.measureData[measureName] && ds.measureData[measureName][label]) {
                                    const arr = ds.measureData[measureName][label];
                                    return arr.length > idx ? arr[idx] : Math.round((arr[0] || 100) * (0.3 + 0.2 * idx));
                                }
                                return Math.round(50 + idx * 20 + label.length * 10);
                            });
                            return { label: cat, data: dataPoints, backgroundColor: color, borderRadius: 6 };
                        });
                    } else {
                        const dataPoints = labels.map(() => Math.floor(Math.random() * 500) + 100);
                        datasetsArr = [{
                            label: measureName,
                            data: dataPoints,
                            backgroundColor: '#4f9fd4',
                            borderRadius: 6
                        }];
                    }
                    return { labels, datasets: datasetsArr };
                }
            };
        })();
    </script>

    <!-- 2. Chart Module (depends on DataModule) -->
    <script>
        var ChartModule = (function(DataModule) {
            // Private
            let currentChart = null;
            let currentChartType = 'bar';
            const ctx = document.getElementById('tableauChart').getContext('2d');

            // Public API
            return {
                render: function(sheet) {
                    const chartData = DataModule.getChartData(sheet.xDim, sheet.yMeas, sheet.colorBy);
                    if (currentChart) currentChart.destroy();

                    const config = {
                        type: sheet.type,
                        data: chartData,
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: (sheet.colorBy !== 'none' && chartData.datasets.length > 1), labels: { color: '#ccc', font: { size: 8 } } },
                                tooltip: { backgroundColor: '#2d3f4d' }
                            },
                            scales: sheet.type !== 'pie' ? {
                                x: { ticks: { color: '#aaa', maxRotation: 30 }, grid: { color: '#3a4b55' } },
                                y: { ticks: { color: '#aaa' }, grid: { color: '#3a4b55' } }
                            } : {}
                        }
                    };
                    currentChart = new Chart(ctx, config);
                },
                setType: function(type) {
                    currentChartType = type;
                    return currentChartType;
                },
                getType: function() {
                    return currentChartType;
                }
            };
        })(DataModule);
    </script>

    <!-- 3. UI Module (depends on DataModule and ChartModule) -->
    <script>
        var UIModule = (function(DataModule, ChartModule) {
            // Private state
            let sheets = [
                { name: 'Sheet 1', xDim: DataModule.getCurrentDataset().dimensions[0], yMeas: DataModule.getCurrentDataset().measures[0], colorBy: 'none', type: 'bar' }
            ];
            let currentSheetIndex = 0;
            let selectedPill = null;

            // DOM elements (cached)
            const dimPills = document.getElementById('dimensionPills');
            const measPills = document.getElementById('measurePills');
            const columnShelf = document.getElementById('column-shelf');
            const rowShelf = document.getElementById('row-shelf');
            const colorSpan = document.getElementById('colorValue');
            const sheetNameSpan = document.getElementById('sheetName');
            const xSelect = document.getElementById('xAxisSelect');
            const ySelect = document.getElementById('yAxisSelect');
            const colorSelect = document.getElementById('colorSelect');
            const datasetNameSpan = document.getElementById('datasetName');

            // Helper: update shelves text
            function updateShelves() {
                const sheet = sheets[currentSheetIndex];
                columnShelf.innerHTML = `<i class="fas fa-tag"></i> ${sheet.xDim}`;
                rowShelf.innerHTML = `<i class="fas fa-chart-line"></i> ${sheet.yMeas}`;
                colorSpan.innerText = sheet.colorBy === 'none' ? 'none' : sheet.colorBy;
                sheetNameSpan.innerText = sheet.name;
            }

            // Helper: sync dropdowns from current sheet
            function syncDropdowns() {
                const sheet = sheets[currentSheetIndex];
                xSelect.value = sheet.xDim;
                ySelect.value = sheet.yMeas;
                colorSelect.value = sheet.colorBy;
            }

            // Save current dropdown values to sheet
            function saveCurrentToSheet() {
                const sheet = sheets[currentSheetIndex];
                sheet.xDim = xSelect.value;
                sheet.yMeas = ySelect.value;
                sheet.colorBy = colorSelect.value;
                sheet.type = ChartModule.getType();
            }

            // Render chart and update UI
            function refreshChart() {
                ChartModule.render(sheets[currentSheetIndex]);
                updateShelves();
                syncDropdowns();
                clearSelectedPill();
            }

            // Pill selection
            function clearSelectedPill() {
                if (selectedPill) {
                    selectedPill.element.classList.remove('selected');
                    selectedPill = null;
                }
            }
            function selectPill(element, type, field) {
                if (selectedPill && selectedPill.element === element) {
                    clearSelectedPill();
                    return;
                }
                if (selectedPill) selectedPill.element.classList.remove('selected');
                element.classList.add('selected');
                selectedPill = { element, type, field };
            }

            // Assignment functions
            function assignToColumn() {
                if (!selectedPill || selectedPill.type !== 'dimension') return;
                xSelect.value = selectedPill.field;
                saveCurrentToSheet();
                refreshChart();
                clearSelectedPill();
            }
            function assignToRow() {
                if (!selectedPill || selectedPill.type !== 'measure') return;
                ySelect.value = selectedPill.field;
                saveCurrentToSheet();
                refreshChart();
                clearSelectedPill();
            }
            function assignToColor() {
                if (!selectedPill || selectedPill.type !== 'dimension') return;
                colorSelect.value = selectedPill.field;
                saveCurrentToSheet();
                refreshChart();
                clearSelectedPill();
            }

            // Populate pills and dropdowns based on current dataset
            function buildUIForDataset() {
                const ds = DataModule.getCurrentDataset();
                datasetNameSpan.innerText = ds.name;

                // Dimensions
                dimPills.innerHTML = '';
                ds.dimensions.forEach(dim => {
                    const pill = document.createElement('span');
                    pill.className = 'pill';
                    pill.setAttribute('data-type', 'dimension');
                    pill.setAttribute('data-field', dim);
                    pill.innerHTML = `<i class="fas fa-tag"></i>${dim}`;
                    pill.addEventListener('click', (e) => {
                        e.stopPropagation();
                        selectPill(pill, 'dimension', dim);
                    });
                    dimPills.appendChild(pill);
                });

                // Measures
                measPills.innerHTML = '';
                ds.measures.forEach(meas => {
                    const pill = document.createElement('span');
                    pill.className = 'pill measure';
                    pill.setAttribute('data-type', 'measure');
                    pill.setAttribute('data-field', meas);
                    pill.innerHTML = `<i class="fas fa-chart-line"></i>${meas}`;
                    pill.addEventListener('click', (e) => {
                        e.stopPropagation();
                        selectPill(pill, 'measure', meas);
                    });
                    measPills.appendChild(pill);
                });

                // Dropdowns
                xSelect.innerHTML = '';
                ds.dimensions.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d; opt.textContent = d;
                    xSelect.appendChild(opt);
                });
                ySelect.innerHTML = '';
                ds.measures.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m; opt.textContent = m;
                    ySelect.appendChild(opt);
                });
                colorSelect.innerHTML = '<option value="none">None</option>';
                ds.colorDimensions.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c; opt.textContent = c;
                    colorSelect.appendChild(opt);
                });

                // Reset sheets
                sheets = [{ name: 'Sheet 1', xDim: ds.dimensions[0], yMeas: ds.measures[0], colorBy: 'none', type: 'bar' }];
                currentSheetIndex = 0;
                ChartModule.setType('bar');
                refreshChart();
                updateSheetTabs();
            }

            // Sheet tabs management
            function updateSheetTabs() {
                const sheetBar = document.getElementById('sheetBar');
                const addBtn = document.getElementById('addSheetTab');
                while (sheetBar.children.length > 1) {
                    sheetBar.removeChild(sheetBar.firstChild);
                }
                sheets.forEach((sheet, idx) => {
                    const tab = document.createElement('div');
                    tab.className = 'sheet-tab' + (idx === currentSheetIndex ? ' active' : '');
                    tab.setAttribute('data-sheet-index', idx);
                    tab.innerHTML = `<i class="fas fa-chart-pie"></i> ${sheet.name}`;
                    tab.addEventListener('click', () => switchSheet(idx));
                    sheetBar.insertBefore(tab, addBtn);
                });
            }

            function switchSheet(index) {
                if (index >= sheets.length) return;
                currentSheetIndex = index;
                const sheet = sheets[index];
                xSelect.value = sheet.xDim;
                ySelect.value = sheet.yMeas;
                colorSelect.value = sheet.colorBy;
                ChartModule.setType(sheet.type);
                refreshChart();
                updateSheetTabs();
            }

            function addNewSheet() {
                const ds = DataModule.getCurrentDataset();
                const newIdx = sheets.length;
                sheets.push({
                    name: `Sheet ${newIdx+1}`,
                    xDim: ds.dimensions[0],
                    yMeas: ds.measures[0],
                    colorBy: 'none',
                    type: 'bar'
                });
                switchSheet(newIdx);
                updateSheetTabs();
            }

            // Public API
            return {
                init: function() {
                    // Build initial UI
                    buildUIForDataset();

                    // Event listeners
                    document.getElementById('columnShelf').addEventListener('click', assignToColumn);
                    document.getElementById('rowShelf').addEventListener('click', assignToRow);
                    document.getElementById('colorMark').addEventListener('click', assignToColor);
                    document.getElementById('sizeMark').addEventListener('click', () => alert('Size (demo)'));
                    document.getElementById('labelMark').addEventListener('click', () => alert('Label (demo)'));

                    xSelect.addEventListener('change', () => { saveCurrentToSheet(); refreshChart(); });
                    ySelect.addEventListener('change', () => { saveCurrentToSheet(); refreshChart(); });
                    colorSelect.addEventListener('change', () => { saveCurrentToSheet(); refreshChart(); });

                    document.getElementById('barBtn').addEventListener('click', () => {
                        ChartModule.setType('bar');
                        sheets[currentSheetIndex].type = 'bar';
                        refreshChart();
                    });
                    document.getElementById('lineBtn').addEventListener('click', () => {
                        ChartModule.setType('line');
                        sheets[currentSheetIndex].type = 'line';
                        refreshChart();
                    });
                    document.getElementById('pieBtn').addEventListener('click', () => {
                        ChartModule.setType('pie');
                        sheets[currentSheetIndex].type = 'pie';
                        refreshChart();
                    });

                    // Dataset selector
                    document.getElementById('datasetSelector').addEventListener('change', (e) => {
                        if (DataModule.switchDataset(e.target.value)) {
                            buildUIForDataset();
                        }
                    });

                    // Menu (hamburger)
                    const menuIcon = document.getElementById('menuIcon');
                    const menuDropdown = document.getElementById('menuDropdown');
                    menuIcon.addEventListener('click', (e) => {
                        e.stopPropagation();
                        menuDropdown.classList.toggle('show');
                    });
                    document.addEventListener('click', (e) => {
                        if (!menuIcon.contains(e.target) && !menuDropdown.contains(e.target)) {
                            menuDropdown.classList.remove('show');
                        }
                    });

                    // Sheet menu items
                    document.querySelectorAll('.menu-item[data-sheet]').forEach(item => {
                        item.addEventListener('click', () => {
                            const idx = parseInt(item.dataset.sheet, 10);
                            if (idx < sheets.length) switchSheet(idx);
                            menuDropdown.classList.remove('show');
                        });
                    });
                    document.getElementById('newSheetBtn').addEventListener('click', () => {
                        addNewSheet();
                        menuDropdown.classList.remove('show');
                    });

                    // Add sheet via tab bar
                    document.getElementById('addSheetTab').addEventListener('click', addNewSheet);

                    // Toolbar icons
                    document.getElementById('searchIcon').addEventListener('click', () => alert('🔍 search'));
                    document.getElementById('undoIcon').addEventListener('click', () => alert('↩️ undo'));
                    document.getElementById('shareIcon').addEventListener('click', () => alert('📤 share'));
                }
            };
        })(DataModule, ChartModule);

        // Initialize the app
        UIModule.init();
    </script>
</body>
</html>
